<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Off-Page SEO Expert</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050a15; color: #cbd5e1; font-family: 'Inter', sans-serif; }
        .contact-card { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s ease; }
        .social-btn { transition: all 0.3s ease; border: 1px solid transparent; }
        .social-btn:hover { transform: translateY(-5px); border-color: #3b82f6; box-shadow: 0 10px 20px rgba(59, 130, 246, 0.2); }
        .input-field { background: rgba(15, 23, 42, 0.8); border: 1px solid #1e293b; color: white; transition: all 0.3s; }
        .input-field:focus { border-color: #3b82f6; outline: none; box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body class="py-20 px-6">
    <div class="max-w-6xl mx-auto">
        <div class="text-center mb-16">
            <h1 class="text-4xl md:text-6xl font-black italic uppercase text-white mb-4">Contact Me Directly</h1>
            <p class="text-blue-400 font-medium uppercase tracking-widest text-sm">Let's discuss your SEO project via your favorite platform</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
            <div class="contact-card p-10 rounded-[40px]">
                <h3 class="text-2xl font-bold text-white mb-10 text-center lg:text-left">Social Media & Email</h3>
                <div class="grid grid-cols-2 gap-6">
                    <a href="https://wa.me/923074646927" target="_blank" class="social-btn bg-slate-800/50 p-6 rounded-3xl text-center">
                        <i class="fab fa-whatsapp text-4xl text-green-500 mb-3"></i>
                        <span class="block text-sm font-bold text-white">WhatsApp</span>
                    </a>
                    <a href="https://t.me/Nadeemmayos" target="_blank" class="social-btn bg-slate-800/50 p-6 rounded-3xl text-center">
                        <i class="fab fa-telegram text-4xl text-blue-400 mb-3"></i>
                        <span class="block text-sm font-bold text-white">Telegram</span>
                    </a>
                    <a href="https://www.linkedin.com/in/menadeem" target="_blank" class="social-btn bg-slate-800/50 p-6 rounded-3xl text-center">
                        <i class="fab fa-linkedin text-4xl text-blue-600 mb-3"></i>
                        <span class="block text-sm font-bold text-white">LinkedIn</span>
                    </a>
                    <a href="mailto:Admin@offpageseoexpert.com" class="social-btn bg-blue-600/10 border-blue-500/20 p-6 rounded-3xl text-center">
                        <i class="fas fa-envelope text-4xl text-blue-500 mb-3"></i>
                        <span class="block text-sm font-bold text-white uppercase">Email Admin</span>
                    </a>
                </div>
            </div>

            <div class="contact-card p-10 rounded-[40px]">
                <h3 class="text-2xl font-bold text-white mb-8">Send a Message</h3>
                <form action="#" class="space-y-6">
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2 ml-1">Name</label>
                        <input type="text" placeholder="Your Name" class="input-field w-full p-4 rounded-2xl">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2 ml-1">Email</label>
                        <input type="email" placeholder="Your Email" class="input-field w-full p-4 rounded-2xl">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2 ml-1">Message</label>
                        <textarea rows="4" placeholder="How can I help you?" class="input-field w-full p-4 rounded-2xl"></textarea>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 hover:bg-white hover:text-blue-600 text-white font-black uppercase tracking-widest py-5 rounded-2xl transition-all duration-500 shadow-lg shadow-blue-900/20">
                        Send Message
                    </button>
                </form>
            </div>
        </div>

        <footer class="mt-20 text-center">
            <p class="text-slate-500 text-sm">© 2026 OFF PAGE SEO EXPERT | Your Trusted SEO Partner</p>
        </footer>
    </div>
</body>
</html>
