<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium SEO Inventory - OffPage SEO Expert</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.11.5/css/jquery.dataTables.css">
    <style>
        .dataTables_wrapper .dataTables_length, .dataTables_wrapper .dataTables_filter, 
        .dataTables_wrapper .dataTables_info, .dataTables_wrapper .dataTables_paginate { color: #94a3b8 !important; }
        input[type="search"] { background: #1e293b !important; border: 1px solid #334155 !important; color: white !important; border-radius: 20px !important; padding: 5px 15px !important; outline: none; margin-bottom: 10px; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0a1224; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#0a1224] text-white font-sans">

    <nav class="bg-[#0f172a] p-4 sticky top-0 z-50 border-b border-blue-900/30 shadow-2xl">
        <div class="container mx-auto flex justify-between items-center px-4">
            <h1 class="text-xl font-bold italic uppercase underline decoration-blue-500 tracking-tighter">OFFPAGE SEO <span class="text-blue-400">AGENCY</span></h1>
            <div class="hidden md:flex gap-6 font-bold text-[12px] uppercase italic">
                <a href="index.html" class="hover:text-blue-400 transition-colors">Home</a>
                <a href="inventory.html" class="text-blue-400 border-b-2 border-blue-400">Site Inventory</a>
                <a href="contact.html" class="hover:text-blue-400 transition-colors">Contact</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-12">
        <div class="mb-10 border-l-4 border-blue-600 pl-4">
            <h2 class="text-3xl md:text-5xl font-black uppercase tracking-tighter text-white">PREMIUM GUEST POST <span class="text-blue-500">INVENTORY</span></h2>
            <p class="text-slate-400 text-sm italic">Verified Database - 50,000+ High-Authority Sites</p>
        </div>

        <div class="bg-[#0f172a] rounded-[2rem] shadow-2xl border border-blue-900/30 overflow-hidden p-6">
            <div class="overflow-x-auto">
                <table id="inventoryTable" class="w-full text-left border-separate border-spacing-y-2">
                    <thead>
                        <tr class="uppercase text-[10px] md:text-[11px] font-black tracking-widest border-b border-blue-500/20">
                            <th class="p-3 text-blue-400">Publication</th>
                            <th class="p-3 text-center text-blue-400">URLs</th>
                            <th class="p-3 text-center text-blue-400">Genres</th>
                            <th class="p-3 text-center text-green-400">Price(USD)</th>
                            <th class="p-3 text-center text-blue-400">DA</th>
                            <th class="p-3 text-center text-blue-400">DR</th>
                            <th class="p-3 text-center text-yellow-500">TAT</th>
                            <th class="p-3 text-center text-blue-400">Region</th>
                            <th class="p-3 text-center text-orange-500">Most Visit</th>
                            <th class="p-3 text-center text-blue-400">Sponsored</th>
                            <th class="p-3 text-center text-blue-400">Indexed</th>
                            <th class="p-3 text-center text-blue-400">Do Follow</th>
                            <th class="p-3 text-center text-red-500">Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="13" class="text-center p-20 text-slate-500 italic animate-pulse">Connecting to Database...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script type="text/javascript" charset="utf8" src="https://cdn.datatables.net/1.11.5/js/jquery.dataTables.js"></script>

    <script>
        const sheetId = '1uIlU2a28IgFk66lsf_tThBgbaMrFEmJ71jgSODoB2ew';
        const sheetName = 'USA'; 
        const url = https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)};

        async function fetchDatabase() {
            try {
                const response = await fetch(url);
                const text = await response.text();
                const json = JSON.parse(text.substring(47).slice(0, -2));
                const rows = json.table.rows;
                let html = "";

                rows.forEach(row => {
                    const getV = (i) => {
                        if (!row.c || !row.c[i]) return "-";
                        return row.c[i].f ? row.c[i].f : (row.c[i].v !== null ? row.c[i].v : "-");
                    };

                    const name = getV(0);
                    const link = getV(1);

                    html += `
                        <tr class="bg-[#161e2d] hover:bg-[#1e293b] border-b border-blue-900/10 transition-all text-[11px]">
                            <td class="p-3 text-white font-bold uppercase">${name}</td>
                            <td class="p-3 text-center text-blue-400"><a href="${link}" target="_blank">Visit Site</a></td>
                            <td class="p-3 text-center text-slate-400">${getV(2)}</td>
                            <td class="p-3 text-center text-green-400 font-black">${getV(3)}</td>
                            <td class="p-3 text-center text-white font-bold">${getV(4)}</td>
                            <td class="p-3 text-center text-white font-bold">${getV(5)}</td>
                            <td class="p-3 text-center text-yellow-500 font-bold">${getV(6)}</td>
                            <td class="p-3 text-center text-slate-300">${getV(7)}</td>
                            <td class="p-3 text-center text-orange-400 font-bold">${getV(8)}</td>
                            <td class="p-3 text-center text-slate-400">${getV(9)}</td>
                            <td class="p-3 text-center text-slate-400">${getV(10)}</td>
                            <td class="p-3 text-center text-slate-400">${getV(11)}</td>
                            <td class="p-3 text-center">
                                <a href="https://wa.me/923074646927?text=Hi, I am interested in ${name}" target="_blank" class="bg-green-600/20 hover:bg-green-600 text-green-400 hover:text-white px-3 py-1 rounded-lg text-[10px] font-bold transition-all inline-block">WhatsApp</a>
                            </td>
                        </tr>`;
                });

                document.getElementById('tableBody').innerHTML = html;
                $('#inventoryTable').DataTable({
                    "pageLength": 25,
                    "scrollX": true,
                    "language": { "search": "", "searchPlaceholder": "Search Sites..." }
                });

            } catch (err) {
                document.getElementById('tableBody').innerHTML = <tr><td colspan="13" class="text-center p-10 text-red-500 font-bold">Error loading data. Check sheet publication.</td></tr>;
            }
        }
        fetchDatabase();
    </script>
</body>
</html>
