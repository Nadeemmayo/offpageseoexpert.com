<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO Inventory - Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.11.5/css/jquery.dataTables.css">
    
    <style>
        /* Table Structure Fix */
        #inventoryTable { width: 100% !important; border-collapse: collapse !important; }
        .dataTables_wrapper { padding: 20px; background: #0f172a; border-radius: 15px; }
        
        /* Heading Styling */
        thead th { 
            color: #3b82f6 !important; 
            text-transform: uppercase; 
            font-size: 11px; 
            padding: 15px 10px !important;
            border-bottom: 2px solid #1e293b !important;
            text-align: left !important;
        }

        /* Search & Info Styling */
        .dataTables_filter input { 
            background: #1e293b !important; border: 1px solid #334155 !important; 
            color: white !important; border-radius: 5px; padding: 5px 10px; margin-bottom: 10px;
        }
        .dataTables_info, .dataTables_length, .dataTables_paginate { color: #94a3b8 !important; font-size: 12px; margin-top: 15px; }

        tr { border-bottom: 1px solid #1e293b; }
        td { padding: 12px 10px !important; color: #cbd5e1; font-size: 12px; }
        
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#0a1224] text-white">

    <main class="container mx-auto py-10 px-4">
        <div class="overflow-x-auto shadow-2xl border border-blue-900/20 rounded-xl bg-[#0f172a]">
            <table id="inventoryTable" class="display">
                <thead>
                    <tr>
                        <th>Publication</th>
                        <th>URLs</th>
                        <th>Genres</th>
                        <th>Price(USD)</th>
                        <th>DA</th>
                        <th>DR</th>
                        <th>TAT</th>
                        <th>Region</th>
                        <th>Most Visit</th>
                        <th>Sponsored</th>
                        <th>Indexed</th>
                        <th>Do Follow</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Example.com</td>
                        <td>Link</td>
                        <td>Tech</td>
                        <td>$Quote</td>
                        <td>50</td>
                        <td>45</td>
                        <td>2 Days</td>
                        <td>USA</td>
                        <td>5k</td>
                        <td>No</td>
                        <td>Yes</td>
                        <td>Yes</td>
                        <td>Contact</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <section class="bg-blue-600 py-16 text-center mt-10">
        <div class="container mx-auto px-4">
            <h2 class="text-4xl md:text-6xl font-black text-white mb-2 uppercase italic tracking-tighter">TOP 50K+ HIGH-AUTHORITY</h2>
            <p class="text-blue-100 text-lg mb-8 italic">Direct access to our massive database for bulk orders.</p>
            
            <div class="flex flex-col md:flex-row justify-center gap-4">
                <a href="https://wa.me/923074646927" class="bg-[#10b981] text-white font-bold py-4 px-10 rounded-full shadow-lg flex items-center justify-center gap-2 hover:scale-105 transition">
                    <i class="fab fa-whatsapp text-xl"></i> CONTACT FOR PRICING
                </a>
                <a href="#" class="bg-white text-blue-600 font-bold py-4 px-10 rounded-full shadow-lg flex items-center justify-center gap-2 hover:scale-105 transition">
                    <i class="fas fa-external-link-alt text-xl"></i> VISIT GOOGLE SHEET
                </a>
            </div>
        </div>
    </section>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script type="text/javascript" charset="utf8" src="https://cdn.datatables.net/1.11.5/js/jquery.dataTables.js"></script>
    <script>
        $(document).ready(function() {
            $('#inventoryTable').DataTable({
                "pageLength": 25,
                "responsive": true,
                "language": {
                    "search": "Filter:",
                    "searchPlaceholder": "Search sites..."
                }
            });
        });
    </script>
</body>
</html>
