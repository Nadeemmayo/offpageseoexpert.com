<link rel="stylesheet" href="https://cdn.datatables.net/1.11.5/css/jquery.dataTables.min.css">
<script src="https://cdn.datatables.net/1.11.5/js/jquery.dataTables.min.js"></script>

<script>

const sheetId = "1uIlU2a28IgFk66lsf_tThBgbaMrFEmJ71jgSODoB2ew";
const sheetName = "Sheet1";

const url = https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=${sheetName};

fetch(url)
.then(res => res.text())
.then(data => {

const json = JSON.parse(data.substring(47).slice(0,-2));
const rows = json.table.rows;

let html = "";

rows.forEach(row => {

const get = (i)=>{
return row.c[i] ? row.c[i].v : "";
};

const siteName = get(0);
const siteURL = get(1);

html += `
<tr class="bg-[#161e2d] hover:bg-[#1e293b] text-[11px]">

<td class="p-3 text-white font-bold">${siteName}</td>

<td class="p-3 text-center">
<a href="${siteURL}" target="_blank" class="text-blue-400">
Visit
</a>
</td>

<td class="p-3 text-center">${get(2)}</td>

<td class="p-3 text-center text-green-400 font-bold">${get(3)}</td>

<td class="p-3 text-center text-blue-300">${get(4)}</td>

<td class="p-3 text-center text-indigo-300">${get(5)}</td>

<td class="p-3 text-center text-yellow-400">${get(6)}</td>

<td class="p-3 text-center">${get(7)}</td>

<td class="p-3 text-center">${get(8)}</td>

<td class="p-3 text-center">${get(9)}</td>

<td class="p-3 text-center">${get(10)}</td>

<td class="p-3 text-center">${get(11)}</td>

<td class="p-3 text-center">

<a href="https://wa.me/923074646927?text=Interested in ${siteName}" target="_blank">WhatsApp</a>

</td>

</tr>
`;

});

document.getElementById("tableBody").innerHTML = html;

$('#inventoryTable').DataTable({

pageLength:25,

scrollX:true,

pagingType:"full_numbers",

language:{
search:"",
searchPlaceholder:"Search from 1500+ Sites..."
}

});

})
.catch(err => console.log(err));

</script>
